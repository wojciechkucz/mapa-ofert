document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-3\"><\u002Fpath><path d=\"M3 16v3a2 2 0 0 0 2 2h3\"><\u002Fpath><path d=\"M16 21h3a2 2 0 0 0 2-2v-3\"><\u002Fpath><\u002Fsvg>\n    <span id=\"fs-lab\">Pełny ekran<\u002Fspan>\n  <\u002Fbutton>\n  <div id=\"loader\">\n    <div class=\"spinner\"><\u002Fdiv>\n    <div id=\"loader-txt\">Pobieranie ofert…<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script src=\"c1f184e5-fb8c-4dcf-9034-dd64dc78732b\"><\u002Fscript>\n<script src=\"9c2f37db-bea1-4dfc-8be3-c09025057e47\"><\u002Fscript>\n<script src=\"825de015-5a5a-48d3-b732-8e909d6ff56f\"><\u002Fscript>\n<script src=\"5e5a7955-d001-4ca8-822b-3f851cfb8328\"><\u002Fscript>\n<script>\n/* ════════════════════════════════════════════════════════════\n   KONFIGURACJA (logika 1:1 z wersji oryginalnej, nowy design 3b)\n   ════════════════════════════════════════════════════════════ */\nconst ENDPOINT = 'https://oferty.travelist.pl/api/graphql/query/getSearchOffers';\nconst SEARCH_CONFIG_ID = 1;\nconst PAGE_SIZE = 100;\nconst MAX_OFFERS = 2000;\nconst OFFER_URL = (id, slug) => `https://travelist.pl/${id}/${slug}/`;\n\nconst FACET_GROUPS = [\n  { name: 'Posiłki', items: [\n    { code: 'board_types', value: 'ro', slug: 'wyzywienie-wlasne', label: 'Wyżywienie własne' },\n    { code: 'board_types', value: 'bb', slug: 'sniadania-w-cenie', label: 'Śniadania w cenie' },\n    { code: 'board_types', value: 'hb', slug: 'sniadania-i-obiadokolacje-w-cenie', label: 'Śniadania i obiadokolacje' },\n    { code: 'board_types', value: 'fb', slug: 'sniadania-obiady-i-kolacje-w-cenie', label: 'Śniadania, obiady i kolacje' },\n    { code: 'board_types', value: 'ai', slug: 'all-inclusive', label: 'All inclusive' },\n  ]},\n  { name: 'Lokalizacja', items: [\n    { code: 'listingpages', value: '396', slug: 'hotele-nad-morzem', label: 'Nad morzem' },\n    { code: 'listingpages', value: '476', slug: 'hotele-nad-jeziorem', label: 'Nad jeziorem' },\n    { code: 'listingpages', value: '399', slug: 'hotele-w-gorach', label: 'W górach' },\n    { code: 'tags', value: '9', slug: 'najpiekniejsze-miasta-2', label: 'Najpiękniejsze miasta' },\n  ]},\n  { name: 'Popularne regiony', items: [\n    { code: 'region', value: '1000043', slug: 'beskidy', label: 'Beskidy' },\n    { code: 'region', value: '1000044', slug: 'bieszczady', label: 'Bieszczady' },\n    { code: 'region', value: '1000046', slug: 'dolny-slask', label: 'Dolny Śląsk' },\n    { code: 'region', value: '1000048', slug: 'gory-swietokrzyskie', label: 'Góry Świętokrzyskie' },\n  ]},\n  { name: 'Udogodnienia obiektu', items: [\n    { code: 'facilities', value: '14', slug: 'basen-kryty', label: 'Basen kryty' },\n    { code: 'facilities', value: '15', slug: 'basen-zewnetrzny', label: 'Basen zewnętrzny' },\n    { code: 'facilities', value: '12', slug: 'spa', label: 'SPA' },\n    { code: 'facilities', value: '25', slug: 'sauna', label: 'Sauna' },\n    { code: 'facilities', value: '24', slug: 'jacuzzi', label: 'Jacuzzi' },\n    { code: 'facilities', value: '16', slug: 'silownia', label: 'Siłownia' },\n    { code: 'facilities', value: '19', slug: 'bezplatny-parking-w-hotelu', label: 'Bezpłatny parking w hotelu' },\n    { code: 'facilities', value: '3',  slug: 'mozliwosc-przyjazdu-z-pupilem', label: 'Możliwość przyjazdu z pupilem' },\n    { code: 'facilities', value: '10', slug: 'udogodnienia-dla-osob-niepelnosprawnych', label: 'Udogodnienia dla osób z niepełnosprawnościami' },\n  ]},\n  { name: 'Udogodnienia w pokoju', items: [\n    { code: 'unit_facilities', value: '12', slug: 'aneks-kuchenny', label: 'Aneks kuchenny' },\n    { code: 'unit_facilities', value: '13', slug: 'balkon', label: 'Balkon' },\n    { code: 'unit_facilities', value: '7',  slug: 'klimatyzacja-w-pokoju', label: 'Klimatyzacja' },\n    { code: 'unit_facilities', value: '10', slug: 'ekspres-do-kawy', label: 'Ekspres do kawy' },\n    { code: 'unit_facilities', value: '9',  slug: 'zestaw-do-parzenia-kawy-i-herbaty', label: 'Zestaw do kawy i herbaty' },\n    { code: 'unit_facilities', value: '11', slug: 'mini-lodowka', label: 'Mini lodówka' },\n    { code: 'unit_facilities', value: '1',  slug: 'prywatna-lazienka', label: 'Prywatna łazienka' },\n    { code: 'unit_facilities', value: '3',  slug: 'prysznic', label: 'Prysznic' },\n    { code: 'unit_facilities', value: '2',  slug: 'wanna', label: 'Wanna' },\n    { code: 'unit_facilities', value: '6',  slug: 'tv', label: 'TV' },\n  ]},\n  { name: 'Dla dzieci', items: [\n    { code: 'labels', value: '569', slug: 'dzieci-gratis-2', label: 'Dzieci GRATIS' },\n    { code: 'labels', value: '566', slug: 'atrakcje-dla-dzieci', label: 'Atrakcje dla dzieci' },\n    { code: 'labels', value: '567', slug: 'animacje-dla-dzieci', label: 'Animacje dla dzieci' },\n    { code: 'listingpages', value: '502', slug: 'pokoje-rodzinne', label: 'Pokoje rodzinne' },\n  ]},\n  { name: 'Rodzaj obiektu', items: [\n    { code: 'hotel_type', value: 'Hotel', slug: 'hotel', label: 'Hotel' },\n    { code: 'hotel_type', value: 'Apartment', slug: 'apartamenty', label: 'Apartamenty' },\n    { code: 'hotel_type', value: 'Cottage', slug: 'domki', label: 'Domki' },\n    { code: 'hotel_type', value: 'Guesthouse', slug: 'pensjonaty', label: 'Pensjonaty' },\n    { code: 'hotel_type', value: 'Resort', slug: 'osrodki-wypoczynkowe', label: 'Ośrodki wypoczynkowe' },\n    { code: 'hotel_type', value: 'Castle or Palace/Chateau', slug: 'zamki-i-palace', label: 'Zamki i pałace' },\n    { code: 'hotel_type', value: 'Camping', slug: 'camping', label: 'Camping' },\n  ]},\n  { name: 'Standard obiektu', items: [\n    { code: 'hotel_star_rating', value: '4', slug: '4-gwiazdki', label: '4 ★★★★' },\n    { code: 'hotel_star_rating', value: '5', slug: '5-gwiazdek', label: '5 ★★★★★' },\n  ]},\n  { name: 'Kraj / zagranica', items: [\n    { code: 'country', value: '17892', slug: 'polska', label: 'Polska' },\n    { code: 'listingpages', value: '187', slug: 'zagranica', label: 'Zagranica (wszystkie)' },\n    { code: 'country', value: '13326', slug: 'chorwacja', label: 'Chorwacja' },\n    { code: 'country', value: '11728', slug: 'austria', label: 'Austria' },\n  ]},\n  { name: 'Oferty specjalne', items: [\n    { code: 'listingpages', value: '250', slug: 'hotele-z-reklamy-tv', label: 'Hotele z Reklamy TV' },\n    { code: 'listingpages', value: '198', slug: 'nowosci', label: 'Nowości' },\n    { code: 'listingpages', value: '195', slug: 'tylko-na-travelist', label: 'Tylko na Travelist' },\n    { code: 'listingpages', value: '33',  slug: 'weekend-last-minute', label: 'Weekend last minute' },\n    { code: 'labels', value: '570', slug: 'oferty-dnia', label: 'Oferty dnia' },\n    { code: 'tags', value: '23', slug: 'dla-doroslych', label: 'Dla dorosłych' },\n  ]},\n  { name: 'Hotel + Lot · miasto wylotu', items: [\n    { code: 'listingpages', value: '451', slug: 'loty', label: 'Hotel + Lot (wszystkie)' },\n    { code: 'listingpages', value: '507', slug: 'lot-warszawa-chopin', label: 'Warszawa Chopin' },\n    { code: 'listingpages', value: '506', slug: 'lot-warszawa-modlin', label: 'Warszawa Modlin' },\n    { code: 'listingpages', value: '515', slug: 'lot-krakow', label: 'Kraków' },\n    { code: 'listingpages', value: '514', slug: 'lot-katowice', label: 'Katowice' },\n    { code: 'listingpages', value: '516', slug: 'lot-gdanska', label: 'Gdańsk' },\n    { code: 'listingpages', value: '505', slug: 'lot-wroclaw', label: 'Wrocław' },\n    { code: 'listingpages', value: '511', slug: 'lot-poznan', label: 'Poznań' },\n    { code: 'listingpages', value: '513', slug: 'lot-lodz', label: 'Łódź' },\n    { code: 'listingpages', value: '512', slug: 'lot-lublin', label: 'Lublin' },\n    { code: 'listingpages', value: '510', slug: 'lot-rzeszow', label: 'Rzeszów' },\n    { code: 'listingpages', value: '508', slug: 'lot-szczecin', label: 'Szczecin' },\n    { code: 'listingpages', value: '509', slug: 'lot-olsztyn', label: 'Olsztyn' },\n    { code: 'listingpages', value: '517', slug: 'lot-bydgoszcz', label: 'Bydgoszcz' },\n  ]},\n];\nconst POPULAR = [\n  ['facilities', '14'],\n  ['board_types', 'hb'],\n  ['listingpages', '502'],\n  ['labels', '569'],\n];\n\nconst QUERY = `query getSearchOffers($facets: [FacetInput], $page: Int, $orderBy: SearchOrderBy, $fromDepartureDate: Date, $toDepartureDate: Date, $pageSize: Int, $minPrice: Int, $maxPrice: Int, $latitude: Float, $longitude: Float, $radius: Float, $searchConfigId: ID, $people: [PersonInput], $rankingId: Int, $minNights: Int, $maxNights: Int) {\n  offerSearch(\n    searchParams: {fromDepartureDate: $fromDepartureDate, toDepartureDate: $toDepartureDate, pageNumber: $page, orderBy: $orderBy, pageSize: $pageSize, facets: $facets, minPrice: $minPrice, maxPrice: $maxPrice, latitude: $latitude, longitude: $longitude, radius: $radius, people: $people, rankingId: $rankingId, minNights: $minNights, maxNights: $maxNights}\n    searchConfigId: $searchConfigId\n  ) {\n    totalResultsSize\n    hits {\n      isFuzzy\n      offerCard {\n        id\n        slug\n        title\n        shortTitle\n        discount\n        oldPrice\n        images { url(w: 307, h: 198) }\n        ratings { count average }\n        currency\n        category\n        nights\n        mainLocation\n        discountPercentage\n        hotels {\n          id\n          starRating\n          location { lat lon description address country }\n        }\n        pricing { price numAdults numChildren numInfants oldPrice }\n      }\n    }\n  }\n}`;\n\n/* ═══ MAPA ═══ */\nconst map = L.map('map', { zoomControl: true }).setView([52.1, 19.4], 6);\nL.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {\n  attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19\n}).addTo(map);\n\nconst cluster = L.markerClusterGroup({\n  showCoverageOnHover: false,\n  maxClusterRadius: 46,\n  iconCreateFunction: c => L.divIcon({\n    html: `<div class=\"cpin\">${c.getChildCount()}<\u002Fdiv>`,\n    className: '', iconSize: [40, 40]\n  })\n});\nmap.addLayer(cluster);\n\nconst fmtPrice = g => (g / 100).toLocaleString('pl-PL', { maximumFractionDigits: 0 }) + ' zł';\nconst priceIcon = price => L.divIcon({\n  html: `<div class=\"ppin\">${price ? 'od ' + fmtPrice(price) : 'oferta'}<\u002Fdiv>`,\n  className: '', iconSize: [0, 0], iconAnchor: [0, 0]\n});\nconst centerIcon = L.divIcon({\n  html: `<div class=\"center-pin\"><\u002Fdiv>`,\n  className: '', iconSize: [12, 12], iconAnchor: [6, 6]\n});\n\n/* ═══ POMOCNICZE ═══ */\nconst $ = id => document.getElementById(id);\nconst stars = n => n ? '★'.repeat(Math.min(n, 7)) : '';\nconst esc = s => String(s ?? '').replace(/[&<>\"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[c]));\nconst norm = s => String(s ?? '').toLowerCase()\n  .replace(/ą/g,'a').replace(/ć/g,'c').replace(/ę/g,'e').replace(/ł/g,'l')\n  .replace(/ń/g,'n').replace(/ó/g,'o').replace(/ś/g,'s').replace(/ż/g,'z').replace(/ź/g,'z');\n\nfunction setStatus(n1, n2) { $('status').innerHTML = `<div class=\"n1\">${n1}<\u002Fdiv><div class=\"n2\">${n2 || '&nbsp;'}<\u002Fdiv>`; }\nfunction showError(msg) {\n  const bar = $('error-bar');\n  bar.textContent = msg;\n  bar.classList.add('on');\n  setTimeout(() => bar.classList.remove('on'), 8000);\n}\nfunction haversineKm(lat1, lon1, lat2, lon2) {\n  const R = 6371, toRad = d => d * Math.PI / 180;\n  const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);\n  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;\n  return 2 * R * Math.asin(Math.sqrt(a));\n}\n\n/* ═══ STAN ═══ */\nlet allOffers = [];\nlet apiTotal = 0;\nlet markerById = {};\nlet adultsCount = 2;\nlet fpRange = null;\nlet geoCircle = null, geoMarker = null, picking = false;\nconst activeFacets = new Set();\nconst facetIndex = new Map();\nFACET_GROUPS.forEach(g => g.items.forEach(f => facetIndex.set(f.code + '|' + f.value, { facet: f, els: [], cntEls: [] })));\nconst F = { q: '', priceMin: 0, priceMax: 2000, rate: 0, geo: null, sort: 'price-asc', priceMode: 'night' };\nconst priceCap = () => F.priceMode === 'stay' ? 10000 : 2000;\nfunction stayNights(o) {\n  const sel = fpRange?.selectedDates || [];\n  if (sel.length === 2) return Math.max(1, Math.round((sel[1] - sel[0]) / 864e5));\n  const nmin = parseInt(document.getElementById('f-nmin').value);\n  if (!isNaN(nmin)) return Math.max(1, nmin);\n  return Math.max(1, o.nights || 1);\n}\nfunction dispPrice(o) {\n  const p = o.pricing?.price;\n  return p == null ? null : (F.priceMode === 'stay' ? p * stayNights(o) : p);\n}\nfunction plNoce(n) { return n === 1 ? 'noc' : (n % 10 >= 2 && n % 10 <= 4 && (n % 100 < 12 || n % 100 > 14)) ? 'noce' : 'nocy'; }\nfunction priceSuffix(o) {\n  if (F.priceMode !== 'stay') return ' / noc';\n  const n = stayNights(o);\n  return ' / ' + n + ' ' + plNoce(n);\n}\n\nfunction offerHaystack(o) {\n  return norm([\n    o.title, o.shortTitle, o.mainLocation, o.category,\n    ...(o.hotels || []).map(x => [x.location?.address, x.location?.description, x.location?.country].join(' '))\n  ].join(' '));\n}\n\n/* ═══ ZAPYTANIA API ═══ */\nfunction buildVariables(page) {\n  const v = {\n    page, pageSize: PAGE_SIZE, searchConfigId: SEARCH_CONFIG_ID,\n    facets: [...activeFacets].map(k => {\n      const { facet } = facetIndex.get(k);\n      return { code: facet.code, value: facet.value, slug: facet.slug };\n    })\n  };\n  const dates = fpRange?.selectedDates || [];\n  const iso = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;\n  if (dates[0]) v.fromDepartureDate = iso(dates[0]);\n  if (dates[1]) v.toDepartureDate = iso(dates[1]);\n\n  const nmin = parseInt($('f-nmin').value), nmax = parseInt($('f-nmax').value);\n  if (!isNaN(nmin)) v.minNights = nmin;\n  if (!isNaN(nmax)) v.maxNights = nmax;\n\n  const kids = parseKids();\n  if (adultsCount !== 2 || kids.length) v.people = [...Array(adultsCount).fill({}), ...kids.map(age => ({ age }))];\n  return v;\n}\n\nfunction parseKids() {\n  return $('f-kids').value.split(/[,;]/).map(s => parseInt(s.trim())).filter(n => !isNaN(n) && n >= 0 && n < 18);\n}\n\nasync function gqlFetch(variables) {\n  const res = await fetch(ENDPOINT, {\n    method: 'POST',\n    headers: { 'Content-Type': 'application/json' },\n    body: JSON.stringify({ operationName: 'getSearchOffers', variables, query: QUERY })\n  });\n  if (!res.ok) throw new Error(`HTTP ${res.status}`);\n  const json = await res.json();\n  if (json.errors) throw new Error(json.errors[0]?.message || 'Błąd GraphQL');\n  return json.data.offerSearch;\n}\nconst fetchPage = page => gqlFetch(buildVariables(page));\n\nlet searchSeq = 0;\nasync function search() {\n  const seq = ++searchSeq;\n  $('loader').classList.add('on');\n  $('loader-txt').textContent = 'Pobieranie ofert…';\n  try {\n    let page = 1, total = Infinity, fetched = 0, offers = [];\n    while (fetched < total && fetched < MAX_OFFERS) {\n      const data = await fetchPage(page);\n      if (seq !== searchSeq) return;\n      total = data.totalResultsSize;\n      if (!data.hits.length) break;\n      fetched += data.hits.length;\n      offers = offers.concat(data.hits.filter(h => !h.isFuzzy).map(h => h.offerCard));\n      $('loader-txt').textContent = `Pobrano ${fetched} / ${Math.min(total, MAX_OFFERS)} ofert…`;\n      page++;\n    }\n    allOffers = offers;\n    apiTotal = total === Infinity ? offers.length : total;\n    applyFilters();\n    refreshVisibleCounts();\n  } catch (e) {\n    console.error(e);\n    showError('Nie udało się pobrać ofert: ' + e.message);\n    setStatus('Błąd pobierania', '');\n  } finally {\n    if (seq === searchSeq) $('loader').classList.remove('on');\n  }\n}\nlet facetTimer;\nfunction facetSearchDebounced() {\n  clearTimeout(facetTimer);\n  facetTimer = setTimeout(search, 350);\n}\n\n/* ═══ LICZNIKI TAGÓW (totalResultsSize per tag, cache per stan filtrów) ═══ */\nconst countCache = new Map();\nlet countQueue = Promise.resolve();\nfunction countSig() {\n  const v = buildVariables(1);\n  return JSON.stringify([v.facets?.map(f => f.code + f.value).sort(), v.fromDepartureDate, v.toDepartureDate, v.minNights, v.maxNights, v.people?.length]);\n}\nasync function facetCount(key) {\n  const sig = key + '::' + countSig();\n  if (countCache.has(sig)) return countCache.get(sig);\n  const { facet } = facetIndex.get(key);\n  const v = buildVariables(1);\n  v.pageSize = 1;\n  if (!activeFacets.has(key)) v.facets = v.facets.concat([{ code: facet.code, value: facet.value, slug: facet.slug }]);\n  const data = await gqlFetch(v);\n  countCache.set(sig, data.totalResultsSize);\n  return data.totalResultsSize;\n}\nfunction loadCounts(keys) {\n  keys.forEach(key => {\n    const entry = facetIndex.get(key);\n    if (!entry || !entry.cntEls.length) return;\n    const sig = key + '::' + countSig();\n    if (countCache.has(sig)) { entry.cntEls.forEach(el => el.textContent = countCache.get(sig)); return; }\n    entry.cntEls.forEach(el => el.textContent = '…');\n    countQueue = countQueue\n      .then(() => facetCount(key))\n      .then(n => entry.cntEls.forEach(el => el.textContent = n))\n      .catch(() => entry.cntEls.forEach(el => el.textContent = ''));\n  });\n}\nfunction refreshVisibleCounts() {\n  loadCounts(POPULAR.map(([c, v]) => c + '|' + v));\n  FACET_GROUPS.forEach(g => {\n    if (g._wrap?.classList.contains('open')) loadCounts(g.items.map(f => f.code + '|' + f.value));\n  });\n}\n\n/* ═══ FILTRY KLIENCKIE + RENDER ═══ */\nfunction textMatch(hay, query) {\n  const toks = norm(query).split(/\\s+/).filter(Boolean);\n  return toks.every(t => {\n    if (hay.includes(t)) return true;\n    if (t.length >= 5 && hay.includes(t.slice(0, -1))) return true;\n    if (t.length >= 6 && hay.includes(t.slice(0, -2))) return true;\n    return false;\n  });\n}\n\nfunction passes(o) {\n  if (F.q && !textMatch(offerHaystack(o), F.q)) return false;\n  const pd = dispPrice(o);\n  const price = pd != null ? pd / 100 : null;\n  if (price != null) {\n    if (price < F.priceMin) return false;\n    if (F.priceMax < priceCap() && price > F.priceMax) return false;\n  }\n  if (F.rate > 0) {\n    if (!o.ratings || o.ratings.average == null || o.ratings.average < F.rate) return false;\n  }\n  if (F.geo) {\n    const loc = (o.hotels || []).map(h => h.location).find(l => l?.lat && l?.lon);\n    if (!loc) return false;\n    if (haversineKm(F.geo.lat, F.geo.lng, parseFloat(loc.lat), parseFloat(loc.lon)) > F.geo.km) return false;\n  }\n  return true;\n}\n\nfunction sortOffers(list) {\n  const price = o => { const p = dispPrice(o); return p == null ? Infinity : p; };\n  const rate = o => o.ratings?.average ?? 0;\n  const disc = o => o.discount ?? 0;\n  const s = F.sort;\n  return list.slice().sort((a, b) =>\n    s === 'price-asc' ? price(a) - price(b) :\n    s === 'price-desc' ? price(b) - price(a) :\n    s === 'discount' ? disc(b) - disc(a) :\n    rate(b) - rate(a)\n  );\n}\n\nfunction tipHtml(o, img, price, oldP) {\n  return `<div class=\"tip\">\n    ${img ? `<img src=\"${esc(img)}\" alt=\"\">` : ''}\n    <div class=\"tip-body\">\n      <div class=\"tip-title\">${esc(o.shortTitle || o.title)}<\u002Fdiv>\n      <div class=\"tip-loc\">${esc(o.mainLocation || '')}<\u002Fdiv>\n      <div class=\"tip-price\">\n        ${price ? `<b>od ${fmtPrice(price)}<\u002Fb><span style=\"font-size:10px;color:var(--ink-4);font-weight:600\">${priceSuffix(o)}<\u002Fspan>` : ''}\n        ${oldP && oldP > price ? `<s>${fmtPrice(oldP)}<\u002Fs>` : ''}\n        ${o.discount > 0 ? `<span class=\"tip-disc\">−${o.discount}%<\u002Fspan>` : ''}\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction applyFilters() {\n  const visible = sortOffers(allOffers.filter(passes));\n  cluster.clearLayers();\n  markerById = {};\n  const frag = document.createDocumentFragment();\n  let plotted = 0;\n\n  visible.forEach(o => {\n    const hotel = (o.hotels || []).find(h => h.location?.lat && h.location?.lon);\n    const img = o.images?.[0]?.url || '';\n    const mult = F.priceMode === 'stay' ? stayNights(o) : 1;\n    const price = o.pricing?.price != null ? o.pricing.price * mult : null;\n    const rawOld = o.pricing?.oldPrice || o.oldPrice;\n    const oldP = rawOld ? rawOld * mult : null;\n\n    if (hotel) {\n      const m = L.marker([parseFloat(hotel.location.lat), parseFloat(hotel.location.lon)], { icon: priceIcon(price) });\n      m.bindPopup(popupHtml(o, hotel, img, price, oldP), { maxWidth: 290 });\n      m.bindTooltip(tipHtml(o, img, price, oldP), {\n        direction: 'top', offset: [0, -34], opacity: 1, className: 'offer-tip'\n      });\n      cluster.addLayer(m);\n      markerById[o.id] = m;\n      plotted++;\n    }\n\n    const div = document.createElement('div');\n    div.className = 'result';\n    div.innerHTML = `\n      ${img ? `<img src=\"${esc(img)}\" loading=\"lazy\" alt=\"\">` : '<img alt=\"\">'}\n      <div class=\"r-info\">\n        <div class=\"r-title\">${esc(o.shortTitle || o.title)} <span class=\"star\">${stars(hotel?.starRating)}<\u002Fspan><\u002Fdiv>\n        <div class=\"r-loc\">${esc(o.mainLocation || '')}<\u002Fdiv>\n        <div class=\"r-price\">\n          ${price ? `<b>od ${fmtPrice(price)}<\u002Fb><span style=\"color:var(--ink-4);font-size:9.5px;font-weight:600\">${priceSuffix(o)}<\u002Fspan>` : ''}\n          ${oldP && oldP > price ? `<s>${fmtPrice(oldP)}<\u002Fs>` : ''}\n          ${o.discount > 0 ? `<span class=\"r-disc\">−${o.discount}%<\u002Fspan>` : ''}\n        <\u002Fdiv>\n        ${o.ratings?.count ? `<div class=\"r-rate\"><b>${o.ratings.average}<\u002Fb>/5 · ${o.ratings.count} opinii<\u002Fdiv>` : ''}\n      <\u002Fdiv>`;\n    div.onclick = () => {\n      const m = markerById[o.id];\n      if (m) {\n        map.setView(m.getLatLng(), Math.max(map.getZoom(), 11));\n        setTimeout(() => m.openPopup(), 250);\n      }\n    };\n    frag.appendChild(div);\n  });\n\n  const list = $('res-list');\n  list.innerHTML = '';\n  list.appendChild(frag);\n  $('res-count').textContent = visible.length;\n  $('res-total').textContent = `z ${apiTotal} ofert`;\n  $('tab-res-count').textContent = '· ' + visible.length;\n  $('res-empty').classList.toggle('on', !visible.length);\n\n  if (F.geo && geoCircle) map.fitBounds(geoCircle.getBounds().pad(0.06));\n  else if (plotted) map.fitBounds(cluster.getBounds().pad(0.08));\n  setStatus(`${visible.length} ofert`, `${plotted} na mapie`);\n}\n\nfunction popupHtml(o, hotel, img, price, oldP) {\n  const r = o.ratings;\n  return `<div class=\"pop\">\n    ${img ? `<img src=\"${esc(img)}\" alt=\"\">` : ''}\n    <div class=\"pop-body\">\n      <h3>${esc(o.shortTitle || o.title)} <span class=\"stars\">${stars(hotel?.starRating)}<\u002Fspan><\u002Fh3>\n      <div class=\"pop-sub\">${esc(o.title !== o.shortTitle ? o.title : (o.mainLocation || ''))}<\u002Fdiv>\n      ${r?.count ? `<div class=\"rating\">Ocena gości: <b>${r.average}<\u002Fb> / 5 (${r.count} opinii)<\u002Fdiv>` : ''}\n      <div class=\"price-row\">\n        ${price ? `<span class=\"price-now\">od ${fmtPrice(price)}<\u002Fspan><span style=\"font-size:10.5px;color:var(--ink-4);font-weight:600\">${priceSuffix(o)}<\u002Fspan>` : ''}\n        ${oldP && oldP > price ? `<span class=\"price-old\">${fmtPrice(oldP)}<\u002Fspan>` : ''}\n        ${o.discount > 0 ? `<span class=\"price-disc\">−${o.discount}%<\u002Fspan>` : ''}\n      <\u002Fdiv>\n      ${hotel?.location?.address ? `<div class=\"pop-addr\">${esc(hotel.location.address)}<\u002Fdiv>` : ''}\n      <a class=\"pop-cta\" href=\"${esc(OFFER_URL(o.id, o.slug))}\" target=\"_blank\" rel=\"noopener\">Zobacz ofertę<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* ═══ TAGI — budowa UI ═══ */\nfunction toggleFacet(key) {\n  const entry = facetIndex.get(key);\n  if (!entry) return;\n  const on = !activeFacets.has(key);\n  on ? activeFacets.add(key) : activeFacets.delete(key);\n  entry.els.forEach(el => el.classList.toggle('on', on));\n  FACET_GROUPS.forEach(g => {\n    const n = g.items.filter(f => activeFacets.has(f.code + '|' + f.value)).length;\n    if (g._badge) {\n      g._badge.textContent = n;\n      g._badge.classList.toggle('on', n > 0);\n      g._wrap.classList.toggle('has-active', n > 0);\n    }\n  });\n  const total = activeFacets.size;\n  document.querySelector('[data-clear=\"facets\"]').classList.toggle('on', total > 0);\n  const fb = $('filters-badge');\n  fb.textContent = total;\n  fb.classList.toggle('on', total > 0);\n  facetSearchDebounced();\n}\n\nfunction makeChip(facet) {\n  const key = facet.code + '|' + facet.value;\n  const b = document.createElement('button');\n  b.className = 'chip';\n  b.innerHTML = esc(facet.label).replace(/★+/, m => `<span class=\"star\">${m}<\u002Fspan>`) + ' <span class=\"cnt\"><\u002Fspan>';\n  b.onclick = () => toggleFacet(key);\n  const entry = facetIndex.get(key);\n  entry.els.push(b);\n  entry.cntEls.push(b.querySelector('.cnt'));\n  return b;\n}\n\nconst popWrap = $('popular-chips');\nPOPULAR.forEach(([code, value]) => {\n  const entry = facetIndex.get(code + '|' + value);\n  if (entry) popWrap.appendChild(makeChip(entry.facet));\n});\n\nconst groupsWrap = $('facet-groups');\nFACET_GROUPS.forEach(g => {\n  const wrap = document.createElement('div');\n  wrap.className = 'fgroup';\n  g._wrap = wrap;\n\n  const head = document.createElement('button');\n  head.className = 'fgroup-head';\n  head.innerHTML = `${esc(g.name)} <span class=\"fgroup-badge\"><\u002Fspan> <span class=\"fgroup-chev\">▼<\u002Fspan>`;\n  head.onclick = () => {\n    wrap.classList.toggle('open');\n    if (wrap.classList.contains('open')) loadCounts(g.items.map(f => f.code + '|' + f.value));\n  };\n  g._badge = head.querySelector('.fgroup-badge');\n\n  const body = document.createElement('div');\n  body.className = 'fgroup-body';\n  const chips = document.createElement('div');\n  chips.className = 'chips';\n  g.items.forEach(f => chips.appendChild(makeChip(f)));\n  body.appendChild(chips);\n\n  wrap.appendChild(head);\n  wrap.appendChild(body);\n  groupsWrap.appendChild(wrap);\n});\n\n/* ═══ ZAKŁADKI ═══ */\nfunction setTab(which) {\n  $('tab-filters').classList.toggle('on', which === 'filters');\n  $('tab-results').classList.toggle('on', which === 'results');\n  $('view-filters').classList.toggle('on', which === 'filters');\n  $('view-results').classList.toggle('on', which === 'results');\n}\n$('tab-filters').onclick = () => setTab('filters');\n$('tab-results').onclick = () => setTab('results');\n\n/* ═══ HEADER — kalendarz, goście, szukaj ═══ */\ntry {\n  fpRange = flatpickr('#dates', {\n    mode: 'range',\n    showMonths: 2,\n    minDate: 'today',\n    dateFormat: 'd.m.Y',\n    locale: (window.flatpickr && flatpickr.l10ns && flatpickr.l10ns.pl) ? 'pl' : 'default',\n    onClose: () => { if (F.priceMode === 'stay' && allOffers.length) applyFilters(); }\n  });\n} catch (e) { console.error('flatpickr:', e); }\n\nconst guestsPop = $('guests-pop');\n$('seg-guests').onclick = e => { e.stopPropagation(); guestsPop.classList.toggle('on'); };\nguestsPop.onclick = e => e.stopPropagation();\ndocument.addEventListener('click', () => guestsPop.classList.remove('on'));\n\nfunction updateGuestsLab() {\n  const kids = parseKids();\n  const ppl = adultsCount + (kids.length ? ` os. + ${kids.length} dz.` : ' os.');\n  const nmin = parseInt($('f-nmin').value), nmax = parseInt($('f-nmax').value);\n  let nights = 'dowolnie';\n  if (!isNaN(nmin) && !isNaN(nmax)) nights = `${nmin}–${nmax} nocy`;\n  else if (!isNaN(nmin)) nights = `od ${nmin} nocy`;\n  else if (!isNaN(nmax)) nights = `do ${nmax} nocy`;\n  $('guests-lab').textContent = `${ppl} · ${nights}`;\n}\n$('ad-minus').onclick = () => { adultsCount = Math.max(1, adultsCount - 1); $('ad-val').textContent = adultsCount; updateGuestsLab(); };\n$('ad-plus').onclick = () => { adultsCount = Math.min(9, adultsCount + 1); $('ad-val').textContent = adultsCount; updateGuestsLab(); };\n$('f-kids').addEventListener('input', () => {\n  const kids = parseKids();\n  const b = $('kids-badge');\n  if (kids.length) {\n    b.textContent = `✓ ${kids.length === 1 ? '1 dziecko' : kids.length + ' dzieci'}: ${kids.map(k => k + ' lat').join(', ')}`;\n    b.classList.add('on');\n  } else b.classList.remove('on');\n  updateGuestsLab();\n});\n['f-nmin', 'f-nmax'].forEach(id => $(id).addEventListener('input', () => { updateGuestsLab(); if (F.priceMode === 'stay') applyFilters(); }));\n\nlet qTimer;\n$('q').addEventListener('input', e => {\n  clearTimeout(qTimer);\n  qTimer = setTimeout(() => { F.q = e.target.value.trim(); applyFilters(); }, 220);\n});\n$('q').addEventListener('keydown', e => { if (e.key === 'Enter') { F.q = e.target.value.trim(); applyFilters(); } });\n\n$('btn-search').onclick = () => { guestsPop.classList.remove('on'); search(); };\n\n/* ═══ OCENA ═══ */\ndocument.querySelectorAll('#rate-chips .chip').forEach(ch => {\n  ch.onclick = () => {\n    document.querySelectorAll('#rate-chips .chip').forEach(x => x.classList.remove('on'));\n    ch.classList.add('on');\n    F.rate = parseFloat(ch.dataset.rate);\n    applyFilters();\n  };\n});\n\n/* ═══ CENA ═══ */\nfunction updatePriceUI() {\n  const min = parseInt($('p-min').value), max = parseInt($('p-max').value);\n  F.priceMin = Math.min(min, max);\n  F.priceMax = Math.max(min, max);\n  $('p-min-lab').textContent = F.priceMin + ' zł';\n  $('p-max-lab').textContent = F.priceMax >= priceCap() ? priceCap() + '+ zł' : F.priceMax + ' zł';\n  const lo = F.priceMin / priceCap() * 100, hi = F.priceMax / priceCap() * 100;\n  $('p-fill').style.left = lo + '%';\n  $('p-fill').style.right = (100 - hi) + '%';\n  document.querySelector('[data-clear=\"price\"]').classList.toggle('on', F.priceMin > 0 || F.priceMax < priceCap());\n}\nlet pTimer;\n['p-min', 'p-max'].forEach(id => $(id).addEventListener('input', () => {\n  updatePriceUI();\n  clearTimeout(pTimer);\n  pTimer = setTimeout(applyFilters, 160);\n}));\nupdatePriceUI();\n\ndocument.querySelectorAll('#pmode .pm').forEach(b => b.onclick = () => {\n  if (F.priceMode === b.dataset.mode) return;\n  F.priceMode = b.dataset.mode;\n  document.querySelectorAll('#pmode .pm').forEach(x => x.classList.toggle('on', x === b));\n  $('price-mode-lab').textContent = F.priceMode === 'stay' ? 'Cena za pobyt' : 'Cena za noc';\n  const cap = priceCap(), step = F.priceMode === 'stay' ? 50 : 10;\n  ['p-min', 'p-max'].forEach(id => { $(id).max = cap; $(id).step = step; });\n  $('p-min').value = 0; $('p-max').value = cap;\n  updatePriceUI();\n  applyFilters();\n});\n\n$('res-sort').onchange = e => { F.sort = e.target.value; applyFilters(); };\n\n/* ═══ PROMIEŃ OD PUNKTU ═══ */\nfunction setGeo(lat, lng, label) {\n  const km = Math.max(5, parseInt($('geo-km').value) || 150);\n  F.geo = { lat, lng, km, label };\n  if (geoCircle) map.removeLayer(geoCircle);\n  if (geoMarker) map.removeLayer(geoMarker);\n  geoCircle = L.circle([lat, lng], {\n    radius: km * 1000, color: '#ff5500', weight: 2,\n    fillColor: '#ff5500', fillOpacity: .07, dashArray: '6 6'\n  }).addTo(map);\n  geoMarker = L.marker([lat, lng], { icon: centerIcon, interactive: false }).addTo(map);\n  const st = $('geo-status');\n  st.innerHTML = `Obszar: <b>${km} km<\u002Fb> od: <b>${esc(label)}<\u002Fb>`;\n  st.classList.add('on');\n  document.querySelector('[data-clear=\"geo\"]').classList.add('on');\n  applyFilters();\n}\nfunction clearGeo() {\n  F.geo = null;\n  if (geoCircle) { map.removeLayer(geoCircle); geoCircle = null; }\n  if (geoMarker) { map.removeLayer(geoMarker); geoMarker = null; }\n  $('geo-status').classList.remove('on');\n  $('geo-place').value = '';\n  document.querySelector('[data-clear=\"geo\"]').classList.remove('on');\n  applyFilters();\n}\n\nasync function geocode(q) {\n  try {\n    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&accept-language=pl&q=${encodeURIComponent(q)}`);\n    if (r.ok) {\n      const a = await r.json();\n      if (a.length) return { lat: +a[0].lat, lng: +a[0].lon, label: a[0].display_name.split(',')[0] };\n    }\n  } catch (e) { console.warn('nominatim:', e); }\n  try {\n    const r = await fetch(`https://photon.komoot.io/api/?limit=1&q=${encodeURIComponent(q)}`);\n    if (r.ok) {\n      const a = await r.json();\n      const f = a.features?.[0];\n      if (f) return { lat: f.geometry.coordinates[1], lng: f.geometry.coordinates[0], label: f.properties.name || q };\n    }\n  } catch (e) { console.warn('photon:', e); }\n  return null;\n}\n\n$('geo-find').onclick = async () => {\n  const q = $('geo-place').value.trim();\n  if (!q) { $('geo-place').focus(); return; }\n  $('geo-find').textContent = 'Szukam…';\n  const hit = await geocode(q);\n  $('geo-find').textContent = 'Wyszukaj';\n  if (!hit) { showError(`Nie znaleziono miejsca „${q}\"`); return; }\n  setGeo(hit.lat, hit.lng, hit.label);\n};\n$('geo-place').addEventListener('keydown', e => { if (e.key === 'Enter') $('geo-find').click(); });\n\nfunction exitPickMode() {\n  picking = false;\n  $('geo-pick').classList.remove('on');\n  $('pick-banner').classList.remove('on');\n  $('map').classList.remove('picking');\n}\n$('geo-pick').onclick = () => {\n  picking = !picking;\n  $('geo-pick').classList.toggle('on', picking);\n  $('pick-banner').classList.toggle('on', picking);\n  $('map').classList.toggle('picking', picking);\n};\n(function bindPickCapture() {\n  const el = map.getContainer();\n  let downXY = null;\n  el.addEventListener('pointerdown', e => { downXY = [e.clientX, e.clientY]; }, true);\n  el.addEventListener('click', e => {\n    if (!picking) return;\n    if (downXY && Math.hypot(e.clientX - downXY[0], e.clientY - downXY[1]) > 8) return;\n    e.stopPropagation();\n    e.preventDefault();\n    const ll = map.mouseEventToLatLng(e);\n    exitPickMode();\n    setGeo(ll.lat, ll.lng, `punkt (${ll.lat.toFixed(3)}, ${ll.lng.toFixed(3)})`);\n  }, true);\n})();\n$('geo-km').addEventListener('change', () => { if (F.geo) setGeo(F.geo.lat, F.geo.lng, F.geo.label); });\n\n/* ═══ CZYSZCZENIE ═══ */\nfunction clearFacets(runSearch = true) {\n  activeFacets.clear();\n  facetIndex.forEach(({ els }) => els.forEach(x => x.classList.remove('on')));\n  FACET_GROUPS.forEach(g => { g._badge?.classList.remove('on'); g._wrap?.classList.remove('has-active'); });\n  document.querySelector('[data-clear=\"facets\"]').classList.remove('on');\n  $('filters-badge').classList.remove('on');\n  if (runSearch) search();\n}\ndocument.querySelectorAll('.sec-clear').forEach(el => el.onclick = () => {\n  const what = el.dataset.clear;\n  if (what === 'price') {\n    $('p-min').value = 0; $('p-max').value = priceCap(); updatePriceUI();\n    el.classList.remove('on');\n    applyFilters();\n  } else if (what === 'geo') {\n    clearGeo();\n  } else if (what === 'facets') {\n    clearFacets();\n  }\n});\n$('clear-all').onclick = () => {\n  $('q').value = ''; F.q = '';\n  $('p-min').value = 0; $('p-max').value = priceCap(); updatePriceUI();\n  document.querySelectorAll('#rate-chips .chip').forEach(x => x.classList.toggle('on', x.dataset.rate === '0'));\n  F.rate = 0;\n  if (F.geo) clearGeo();\n  clearFacets();\n};\n\n/* ═══ PEŁNY EKRAN ═══ */\nfunction setFsLab() {\n  const on = !!document.fullscreenElement || document.body.classList.contains('fake-fs');\n  $('fs-lab').textContent = on ? 'Zamknij' : 'Pełny ekran';\n  setTimeout(() => map.invalidateSize(), 80);\n}\n$('btn-fs').onclick = async () => {\n  if (document.fullscreenElement) { document.exitFullscreen(); return; }\n  if (document.body.classList.contains('fake-fs')) { document.body.classList.remove('fake-fs'); setFsLab(); return; }\n  try { await document.documentElement.requestFullscreen(); }\n  catch (e) { document.body.classList.add('fake-fs'); }\n  setFsLab();\n};\ndocument.addEventListener('fullscreenchange', setFsLab);\n\n// start\nsearch();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
